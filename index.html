<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Replit Assistant</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#f26207" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Replit</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-btn active" data-tool="assistant" title="AI Assistant">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </button>
      <button class="nav-btn" data-tool="files" title="Files">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
      </button>
      <button class="nav-btn" data-tool="shell" title="Shell">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      </button>
      <button class="nav-btn" data-tool="secrets" title="Secrets">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </button>
      <button class="nav-btn" data-tool="deploy" title="Deploy">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </button>
    </nav>
  </aside>

  <div id="file-panel" class="panel hidden">
    <div class="panel-header"><span>Files</span><button id="new-file-btn">+</button></div>
    <ul id="file-tree"></ul>
  </div>

  <div id="editor-area">
    <div id="tabs-bar">
      <div id="tabs-list"></div>
      <div id="run-bar">
        <button id="run-btn">
          <svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Run
        </button>
      </div>
    </div>
    <div id="editor-wrapper">
      <div id="editor-container">
        <div id="line-numbers"></div>
        <textarea id="editor" spellcheck="false" placeholder="// Start coding..."></textarea>
      </div>
    </div>
  </div>

  <div id="right-panel">
    <div id="panel-assistant" class="right-tab active">
      <div class="assistant-header">
        <div class="assistant-title">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#f26207" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span>Replit Assistant</span>
        </div>
        <div class="model-badge">GPT-4o</div>
      </div>
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <div id="context-badge" class="hidden">
          <span id="context-filename"></span>
          <button id="remove-context">x</button>
        </div>
        <textarea id="chat-input" placeholder="Ask the assistant anything..." rows="3"></textarea>
        <div class="input-actions">
          <button id="attach-file-btn" title="Attach current file as context">Attach File</button>
          <button id="send-btn">Send</button>
        </div>
      </div>
    </div>

    <div id="panel-shell" class="right-tab hidden">
      <div class="assistant-header">
        <span>Shell</span>
        <button id="clear-shell-btn">clear</button>
      </div>
      <div id="shell-output"></div>
      <div id="shell-input-row">
        <span class="shell-prompt">$</span>
        <input id="shell-input" type="text" placeholder="Enter command..." autocomplete="off" />
      </div>
    </div>

    <div id="panel-secrets" class="right-tab hidden">
      <div class="assistant-header"><span>Secrets (Env Vars)</span></div>
      <div id="secrets-list"></div>
      <div id="secrets-form">
        <input id="secret-key" type="text" placeholder="KEY" />
        <input id="secret-value" type="password" placeholder="value" />
        <button id="add-secret-btn">Add Secret</button>
      </div>
      <p class="secrets-hint">Secrets are encrypted environment variables. In production Replit they are injected at runtime.</p>
    </div>

    <div id="panel-deploy" class="right-tab hidden">
      <div class="assistant-header"><span>Deploy</span></div>
      <div class="deploy-info">
        <div class="deploy-status">
          <span class="status-dot idle" id="deploy-dot"></span>
          <span id="deploy-status-text">Not deployed</span>
        </div>
        <button id="deploy-btn">Deploy Project</button>
        <pre id="deploy-log"></pre>
      </div>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
